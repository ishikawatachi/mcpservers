# Wazuh Single-Node Docker Compose
# Designed for deployment via Portainer + Synology reverse proxy
#
# Required environment variables (set in .env or via Portainer stack env):
#   WAZUH_HOSTNAME          — hostname served by Synology reverse proxy (e.g. wazuh.local.yourdomain.com)
#   INDEXER_PASSWORD        — password for wazuh/kibanaserver indexer accounts
#   DASHBOARD_PASSWORD      — password for the dashboard admin account
#
# Network:
#   Attaches to the shared 'proxy' external network so Synology's reverse
#   proxy can reach the dashboard container at wazuh.local.yourdomain.com
#
# Watchdog:
#   Watchtower is included to auto-update Wazuh images (weekly schedule)
#
# Ports exposed on the Docker host (for Wazuh agents on other hosts):
#   1514/udp  — syslog / events from agents
#   1515/tcp  — agent enrollment
#   55000/tcp — Wazuh API (internal, restricted by firewall)

services:

  # ── Wazuh Indexer (OpenSearch) ─────────────────────────────────────────────
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.9.2
    container_name: wazuh-indexer
    hostname: wazuh.indexer
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - node.name=wazuh.indexer
      - cluster.initial_cluster_manager_nodes=wazuh.indexer
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - plugins.security.ssl.http.pemcert_filepath=/usr/share/wazuh-indexer/certs/wazuh.indexer.pem
      - plugins.security.ssl.http.pemkey_filepath=/usr/share/wazuh-indexer/certs/wazuh.indexer-key.pem
      - plugins.security.ssl.http.pemtrustedcas_filepath=/usr/share/wazuh-indexer/certs/root-ca.pem
      - plugins.security.ssl.transport.pemcert_filepath=/usr/share/wazuh-indexer/certs/wazuh.indexer.pem
      - plugins.security.ssl.transport.pemkey_filepath=/usr/share/wazuh-indexer/certs/wazuh.indexer-key.pem
      - plugins.security.ssl.transport.pemtrustedcas_filepath=/usr/share/wazuh-indexer/certs/root-ca.pem
      - plugins.security.ssl.http.enabled=true
      - plugins.security.ssl.transport.enforce_hostname_verification=false
      - plugins.security.ssl.transport.resolve_hostname=false
      - plugins.security.authcz.admin_dn=CN=admin,OU=Wazuh,O=Wazuh,L=California,C=US
      - plugins.security.check_snapshot_restore_write_privilege=true
      - plugins.security.enable_snapshot_restore_privilege=true
      - plugins.security.nodes_dn=CN=wazuh.indexer,OU=Wazuh,O=Wazuh,L=California,C=US
      - plugins.security.restapi.roles_enabled=["all_access","security_rest_api_access"]
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - wazuh-indexer-certs:/usr/share/wazuh-indexer/certs
    networks:
      - wazuh-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sk --fail https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Wazuh Manager ──────────────────────────────────────────────────────────
  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.2
    container_name: wazuh-manager
    hostname: wazuh.manager
    restart: unless-stopped
    depends_on:
      wazuh.indexer:
        condition: service_healthy
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${DASHBOARD_PASSWORD}
    volumes:
      - wazuh-manager-api:/var/ossec/api/configuration
      - wazuh-manager-etc:/var/ossec/etc
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-queue:/var/ossec/queue
      - wazuh-manager-var:/var/ossec/var
      - wazuh-manager-integrations:/var/ossec/integrations
      - wazuh-manager-active-response:/var/ossec/active-response/bin
      - wazuh-manager-agentless:/var/ossec/agentless
      - wazuh-manager-wodles:/var/ossec/wodles
      - wazuh-indexer-certs:/etc/ssl
    ports:
      - "1514:1514/udp"   # agent syslog
      - "1515:1515"       # agent enrollment
      - "55000:55000"     # Wazuh API (restrict via firewall)
    networks:
      - wazuh-internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -sk --fail https://localhost:55000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── Wazuh Dashboard ────────────────────────────────────────────────────────
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.9.2
    container_name: wazuh-dashboard
    hostname: wazuh.dashboard
    restart: unless-stopped
    depends_on:
      wazuh.manager:
        condition: service_healthy
    environment:
      - INDEXER_USERNAME=kibanaserver
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${DASHBOARD_PASSWORD}
      # Synology reverse proxy terminates HTTPS — dashboard listens on plain HTTP
      - SERVER_SSL_ENABLED=false
      - VIRTUAL_HOST=${WAZUH_HOSTNAME}
    volumes:
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
      - wazuh-indexer-certs:/usr/share/wazuh-dashboard/certs
    expose:
      - "5601"
    networks:
      - wazuh-internal
      - proxy
    labels:
      # If you use Traefik on the proxy network, these labels auto-route traffic.
      # Remove if you configure Synology DSM Reverse Proxy manually.
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk --fail http://localhost:5601/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── Certgen (one-shot) ──────────────────────────────────────────────────────
  # Generates self-signed certs for inter-service TLS. Runs once and exits.
  wazuh.certgen:
    image: wazuh/wazuh-certs-generator:0.0.2
    container_name: wazuh-certgen
    hostname: wazuh.certgen
    profiles: ["certgen"]     # only run when explicitly invoked
    volumes:
      - wazuh-indexer-certs:/certificates
      - ./config.yml:/config/certs.yml:ro

  # ── Watchtower (auto-update watchdog) ──────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower-wazuh
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=604800    # 7 days in seconds
      - WATCHTOWER_LABEL_ENABLE=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - wazuh-internal
    command: wazuh-manager wazuh-indexer wazuh-dashboard

volumes:
  wazuh-indexer-data:
  wazuh-indexer-certs:
  wazuh-manager-api:
  wazuh-manager-etc:
  wazuh-manager-logs:
  wazuh-manager-queue:
  wazuh-manager-var:
  wazuh-manager-integrations:
  wazuh-manager-active-response:
  wazuh-manager-agentless:
  wazuh-manager-wodles:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:

networks:
  wazuh-internal:
    driver: bridge
    internal: true       # no direct internet access; only inter-service
  proxy:
    external: true       # shared network with Synology reverse proxy / Traefik
