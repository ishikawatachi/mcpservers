# Wazuh Single-Node -- Synology / Portainer deployment
#
# Env vars (set in Portainer stack -> Environment):
#   WAZUH_HOSTNAME     -- reverse-proxy hostname (wazuh.local.defaultvaluation.com)
#   INDEXER_PASSWORD   -- password for admin + kibanaserver OpenSearch accounts
#   DASHBOARD_PASSWORD -- password for the wazuh-wui dashboard API user
#
# Host volumes (pre-created on Synology):
#   /volume1/docker/wazuh/wazuh-indexer   -- OpenSearch data
#   /volume1/docker/wazuh/certs           -- shared TLS certs (certgen step)
#   /volume1/docker/wazuh/wazuh-dashboard -- dashboard config/state
#   /volume1/docker/wazuh/wazuh-manager   -- manager data (/var/ossec)
#
# Networks:
#   wazuh_net     -- internal bridge, inter-service only
#   bridge_docker -- external (NPM reverse proxy lives here)
#
# Watchtower already runs globally on this host -- NOT included.
# Run docker-compose.certgen.yml ONCE first to populate certs.

services:

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.9.2
    container_name: wazuh-indexer
    hostname: wazuh.indexer
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m"
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - /volume1/docker/wazuh/wazuh-indexer:/var/lib/wazuh-indexer
      # Custom opensearch.yml: cert paths at /usr/share/wazuh-indexer/certs/
      # (JVM SecurityManager only allows reads within /usr/share/wazuh-indexer/)
      - /volume1/docker/wazuh/wazuh-indexer/opensearch.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      # Certs mounted at the JVM-allowed path (NOT /etc/wazuh-indexer/certs/)
      - /volume1/docker/wazuh/certs:/usr/share/wazuh-indexer/certs:ro
    networks:
      - wazuh_net
    healthcheck:
      # Use credentials — without auth the endpoint returns 401 (curl --fail exits non-zero)
      test: ["CMD-SHELL", "curl -sk --fail -u admin:${INDEXER_PASSWORD} https://localhost:9200/_cluster/health | grep -q green || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.2
    container_name: wazuh-manager
    hostname: wazuh.manager
    restart: unless-stopped
    depends_on:
      wazuh.indexer:
        condition: service_started
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/wazuh.manager.pem
      - SSL_KEY=/etc/ssl/wazuh.manager-key.pem
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${DASHBOARD_PASSWORD}
    volumes:
      - /volume1/docker/wazuh/wazuh-manager:/var/ossec
      - /volume1/docker/wazuh/certs:/etc/ssl:ro
      # Persist filebeat.yml across container recreations (init script restores from data_tmp if missing)
      # data_tmp at /var/ossec/data_tmp/permanent/etc/filebeat/ serves as the restore source
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    networks:
      - wazuh_net
    healthcheck:
      # Wazuh API always returns 401 without a token; accept any 2xx or 4xx as "up"
      test: ["CMD-SHELL", "curl -sk -o /dev/null -w '%{http_code}' https://localhost:55000/ | grep -qE '^[24]' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.9.2
    container_name: wazuh-dashboard
    hostname: wazuh.dashboard
    restart: unless-stopped
    depends_on:
      wazuh.manager:
        condition: service_started
    environment:
      - INDEXER_USERNAME=kibanaserver
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${DASHBOARD_PASSWORD}
      - SERVER_SSL_ENABLED=false
      - VIRTUAL_HOST=${WAZUH_HOSTNAME}
    volumes:
      - /volume1/docker/wazuh/wazuh-dashboard:/usr/share/wazuh-dashboard/data
      # Dashboard certs at the path its default config expects
      - /volume1/docker/wazuh/certs:/etc/wazuh-dashboard/certs:ro
      # Custom config: port 5601, SSL disabled (NPM handles external TLS)
      - /volume1/docker/wazuh/wazuh-dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      # Pin wazuh.yml read-only so wazuh_app_config.sh cannot append duplicate hosts: blocks on restart
      - /volume1/docker/wazuh/wazuh-dashboard/wazuh/config/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
    expose:
      - "5601"
    networks:
      - wazuh_net
      - bridge_docker
    healthcheck:
      test: ["CMD-SHELL", "curl -sk --fail http://localhost:5601/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

networks:
  wazuh_net:
    driver: bridge
  bridge_docker:
    external: true
